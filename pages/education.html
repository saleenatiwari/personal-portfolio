<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Education & Work · Saleena Tiwari</title>
  <style>
    :root { --accent: #1A1A1A; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #57101e; color: #F7ECEC;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    /* elegant top navigation */
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: center; align-items: center;
      flex-wrap: nowrap; white-space: nowrap;            /* stay on one line */
      gap: clamp(0.15rem, 1.8vw, 2rem);
      padding: clamp(0.9rem, 2vw, 1.6rem) clamp(0.6rem, 2vw, 2rem); z-index: 50;
    }
    .site-nav a {
      font-family: "Didot", "Bodoni 72", "Hoefler Text", "Playfair Display", Georgia, serif;
      /* shrink the font as the viewport narrows instead of folding */
      font-size: clamp(0.58rem, 1.4vw, 1.02rem); font-weight: 400; letter-spacing: 0.06em;
      color: #F7ECEC; text-decoration: none;
      padding: 0.45rem clamp(0.25rem, 0.9vw, 1rem); border-radius: 999px;
      transition: background-color 0.25s ease; white-space: nowrap; line-height: 1;
    }
    .site-nav a:hover { background-color: rgba(255, 255, 255, 0.14); }
    .site-nav a.home { font-weight: 700; }
    .badge { width: 14px; height: 14px; border-radius: 50%; background: var(--accent);
      border: 2px solid #F7ECEC; display: inline-block; margin-bottom: 1.5rem; }
    h1 { font-size: clamp(2rem, 6vw, 4rem); letter-spacing: -0.02em; }
    p.sub { margin-top: 0.75rem; color: rgba(247, 236, 236, 0.7); font-size: 1.05rem; }

    /* =====================================================================
       Small-screen gate — this experience is built for a desktop screen.
       On phones, small windows, or portrait orientation we replace the page
       with a short message + a link to the contact page (which stays usable).
       ===================================================================== */
    .desktop-gate { display: none; }
    @media (max-width: 1024px), (orientation: portrait) {
      html, body { overflow: hidden !important; }
      .desktop-gate {
        display: flex; position: fixed; inset: 0; z-index: 99999;
        flex-direction: column; align-items: center; justify-content: center;
        gap: 1.9rem; padding: 2rem; text-align: center;
        background: #57101e; color: #F7ECEC;
      }
      .desktop-gate .gate-title {
        font-family: "Didot", "Bodoni 72", "Hoefler Text", "Playfair Display", Georgia, serif;
        font-weight: 700; font-size: clamp(1.6rem, 6vw, 2.6rem); line-height: 1.25;
        max-width: 20ch; letter-spacing: 0.01em;
      }
      .desktop-gate .gate-btn {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 1rem; font-weight: 600; letter-spacing: 0.02em;
        color: #57101e; background: #F7ECEC; text-decoration: none;
        padding: 0.85rem 2rem; border-radius: 999px;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }
      .desktop-gate .gate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    }
  </style>

  <!-- Vercel Web Analytics + Speed Insights (static-site / "Other" framework) -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <nav class="site-nav">
    <a class="home" href="about.html">About me</a>
    <a href="projects.html">Projects</a>
    <a href="craft.html">Craft</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- shown only on small / portrait screens (see .desktop-gate) -->
  <div class="desktop-gate">
    <p class="gate-title">This site shines brightest on a desktop.</p>
    <a class="gate-btn" href="contact.html">Get in touch</a>
  </div>
  <span class="badge"></span>
  <h1>Education & Work</h1>
  <p class="sub">This page is coming soon.</p>
</body>
</html>
